# Weekly Summary Workflow
# Author: kelexine (https://github.com/kelexine)
# Fires every Sunday at 02:00 UTC via cron, or on-demand via workflow_dispatch.
# Derives builds_completed / builds_failed from the real GitHub Actions API
# (last 7 days of build-nano11, build-tiny11, build-tiny11-core runs) instead
# of the previous hardcoded placeholders.

name: Weekly Summary

on:
  schedule:
    - cron: '0 2 * * 0'  # 2 AM UTC weekly on Sundays
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch real build stats from GitHub Actions API
        id: stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.error
          from datetime import datetime, timezone, timedelta

          token = os.environ["GH_TOKEN"]
          repo  = os.environ["REPO"]
          since = (datetime.now(timezone.utc) - timedelta(days=7)).strftime("%Y-%m-%dT%H:%M:%SZ")

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          build_workflows = [
              "build-nano11.yml",
              "build-tiny11.yml",
              "build-tiny11-core.yml",
          ]

          completed = 0
          failed    = 0

          for wf in build_workflows:
              url = (
                  f"https://api.github.com/repos/{repo}/actions/workflows/{wf}/runs"
                  f"?created=%3E{since}&per_page=100"
              )
              try:
                  req  = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f"Warning: could not fetch runs for {wf}: {e}")
                  continue

              for run in data.get("workflow_runs", []):
                  conclusion = run.get("conclusion")
                  if conclusion == "success":
                      completed += 1
                  elif conclusion in ("failure", "timed_out", "cancelled"):
                      failed += 1

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"builds_completed={completed}\n")
              fh.write(f"builds_failed={failed}\n")
          print(f"Stats: {completed} completed, {failed} failed in the last 7 days")
          EOF

      - name: Generate Summary
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_RELEASES }}
        run: |
          CHECKS=$(jq '.check_count' tracked_releases.json)
          NEW_WEEK=$(jq --arg since "$(date -u -d '7 days ago' +%Y-%m-%d)" \
            '[.builds[] | select(.detected_date >= $since)] | length' \
            tracked_releases.json 2>/dev/null || echo 0)

          COMPLETED=${{ steps.stats.outputs.builds_completed }}
          FAILED=${{ steps.stats.outputs.builds_failed }}

          python3 scripts/discord_notify.py \
            --webhook "$DISCORD_WEBHOOK" \
            --type daily-summary \
            --data "{\"checks_today\":$CHECKS,\"new_releases\":$NEW_WEEK,\"builds_completed\":$COMPLETED,\"builds_failed\":$FAILED}"
