name: Update Download Stats

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch SourceForge stats
        id: stats
        run: |
          START_DATE=$(date -d "2026-01-13" +%Y-%m-%d)
          END_DATE=$(date -u +%Y-%m-%d)
          STATS=$(curl -s "https://sourceforge.net/projects/tiny-11-releases/files/stats/json?start_date=${START_DATE}&end_date=${END_DATE}")

          TOTAL=$(echo "$STATS" | jq -r '.total')
          TOP_COUNTRY=$(echo "$STATS" | jq -r '.summaries.geo.top')
          TOP_COUNTRY_PCT=$(echo "$STATS" | jq -r '.summaries.geo.percent')
          TOP_OS=$(echo "$STATS" | jq -r '.summaries.os.top')
          TOP_OS_PCT=$(echo "$STATS" | jq -r '.summaries.os.percent')

          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "top_country=${TOP_COUNTRY}" >> "$GITHUB_OUTPUT"
          echo "top_country_pct=${TOP_COUNTRY_PCT}" >> "$GITHUB_OUTPUT"
          echo "top_os=${TOP_OS}" >> "$GITHUB_OUTPUT"
          echo "top_os_pct=${TOP_OS_PCT}" >> "$GITHUB_OUTPUT"

          echo "📊 Total: ${TOTAL} | Top Country: ${TOP_COUNTRY} (${TOP_COUNTRY_PCT}%) | Top OS: ${TOP_OS} (${TOP_OS_PCT}%)"

      - name: Update README.md
        run: |
          TOTAL="${{ steps.stats.outputs.total }}"
          TOP_COUNTRY="${{ steps.stats.outputs.top_country }}"
          TOP_COUNTRY_PCT="${{ steps.stats.outputs.top_country_pct }}"
          TOP_OS="${{ steps.stats.outputs.top_os }}"
          TOP_OS_PCT="${{ steps.stats.outputs.top_os_pct }}"

          # Update download count and active users in Project Stats section
          sed -i "s/- \*\*📦 Total Downloads\*\*: .*/- **📦 Total Downloads**: $(printf "%'d" "${TOTAL}") (and growing!)/" README.md
          sed -i "s/- \*\*🌍 Active Users\*\*: .*/- **🌍 Active Users**: $(printf "%'d" "${TOTAL}") worldwide/" README.md

          echo "✅ README.md updated with latest stats"

      - name: Commit and push if changed
        run: |
          git diff --quiet README.md && echo "No changes to commit" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🤖 Update download stats - $(date -u +%Y-%m-%d)"
          git push